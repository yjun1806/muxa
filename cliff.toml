# git-cliff 설정 — 커밋에서 CHANGELOG 릴리스 섹션을 생성한다.
# 전체 재생성은 하지 않는다. scripts/changelog.sh 가 이 설정으로 "새 릴리스 한 섹션"만 만들어
# CHANGELOG.md 의 [Unreleased] 아래에 끼워넣는다(손으로 다듬은 옛 항목은 그대로 둔다).
# 그래서 header/footer 는 비운다 — 파일의 서문·링크는 CHANGELOG.md 가 직접 관리한다.

[changelog]
header = ""
# 한 릴리스 섹션: "## [x.y.z] - YYYY-MM-DD" + 그룹별(### Added…) 커밋 목록.
# 커밋 message 의 첫 줄만, 앞에 붙은 "feat: " 같은 타입 접두어를 떼고 문장으로.
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [Unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}- {{ commit.message | split(pat="\n") | first | trim | upper_first }}
{% endfor %}{% endfor %}"""
footer = ""
trim = true

[git]
conventional_commits = true
# 컨벤션(feat:/fix:…)을 안 지킨 커밋은 릴리스 노트에 넣지 않는다(원문 덤프 방지).
filter_unconventional = true
filter_commits = true
tag_pattern = "v[0-9]*"
# 타입 → Keep a Changelog 섹션. chore·ci 는 사용자용 노트에서 제외.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
]
