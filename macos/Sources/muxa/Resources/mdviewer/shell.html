<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link id="hl-theme" rel="stylesheet" href="hl-light.css">
<link rel="stylesheet" href="md-body.css">
<style>
  :root {
    --bg: #ffffff; --fg: #1f2937; --muted: #6b7280;
    --border: #e2e5e9; --panel: #f3f4f6; --link: #0d9488;
  }
  body.dark {
    --bg: #1b1b1d; --fg: #e4e4e7; --muted: #8a8a90;
    --border: #38383c; --panel: #252528; --link: #2dd4bf;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  /* 본문 조판은 md-body.css 공용 — diff 문서 뷰어와 한 파일을 쓴다 */
  /* raw HTML 문서(.html)는 셸 스타일 없이 그대로 */
  body.raw .markdown-body { max-width: none; padding: 0; }
  /* 원본(source) 보기 — 파싱 없이 원문 텍스트를 폭 가득 채운 pre로. 긴 줄은 접는다. */
  body.source .markdown-body { max-width: none; padding: 16px; }
  body.source pre.src { margin: 0; white-space: pre-wrap; word-break: break-word; }
</style>
<script src="markdown-it.min.js"></script>
<script src="highlight.min.js"></script>
<script src="mermaid.min.js"></script>
</head>
<body>
<article id="content" class="markdown-body"></article>
<script>
  const md = window.markdownit({
    html: true, linkify: true, typographer: false,
    highlight: (str, lang) => {
      if (lang === 'mermaid') return '<code class="language-mermaid">' + md.utils.escapeHtml(str) + '</code>';
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(str, { language: lang }).value; } catch (e) {}
      }
      return '';
    }
  });

  function setTheme(dark) {
    document.getElementById('hl-theme').href = dark ? 'hl-dark.css' : 'hl-light.css';
    document.body.classList.toggle('dark', !!dark);
    mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default', securityLevel: 'strict' });
  }

  // b64: UTF-8 base64. raw=true면 md 파싱 없이 원문 HTML 그대로(.html 파일).
  // source=true면 렌더 대신 원문 텍스트를 그대로 보여준다(md/html 공통 "원본 보기").
  function render(b64, dark, raw, source) {
    setTheme(dark);
    const text = decodeURIComponent(escape(atob(b64)));
    document.body.classList.toggle('source', !!source);
    if (source) {
      // .raw와 겹치지 않게 명시적으로 정리 — CSS 규칙 순서에 기대지 않는다(.html을 원본으로 볼 때).
      document.body.classList.remove('raw');
      // 원문을 escape해 pre로. md는 markdown, html은 xml 문법 하이라이트(실패해도 escape로 폴백).
      const lang = raw ? 'xml' : 'markdown';
      let html;
      try { html = hljs.highlight(text, { language: lang }).value; }
      catch (e) { html = md.utils.escapeHtml(text); }
      document.getElementById('content').innerHTML =
        '<pre class="src"><code class="hljs">' + html + '</code></pre>';
      window.scrollTo(0, 0);
      return;
    }
    document.body.classList.toggle('raw', !!raw);
    const el = document.getElementById('content');
    el.innerHTML = raw ? text : md.render(text);
    if (!raw) {
      el.querySelectorAll('code.language-mermaid').forEach((code) => {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        const pre = code.closest('pre') || code;
        pre.replaceWith(div);
      });
      try { mermaid.run({ querySelector: '.mermaid' }); } catch (e) {}
    }
    window.scrollTo(0, 0);
  }

  // 링크 클릭은 뷰어 안에서 이동시키지 않고 네이티브로 넘긴다(외부=브라우저, 로컬 파일=앱 내 새 탭).
  // 페이지 내 앵커(#…)만 기본 동작(스크롤)을 남긴다. 이벤트 위임이라 render마다 다시 걸 필요 없다.
  document.addEventListener('click', (e) => {
    const a = e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href') || '';
    if (href.startsWith('#')) return; // 페이지 내 앵커는 그대로 스크롤
    e.preventDefault();
    try { window.webkit.messageHandlers.muxaLink.postMessage(href); } catch (err) {}
  });
</script>
</body>
</html>
