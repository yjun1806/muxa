<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="shiki.bundle.js"></script>
</head>
<body>
<script>
  const readyPromise = MuxaShiki.init();
  // 코드 → 라인별 토큰 JSON [[[content, color], ...], ...]. 표시는 네이티브 NSTextView가 담당.
  async function tokensJson(b64, dark, lang) {
    await readyPromise;
    const code = decodeURIComponent(escape(atob(b64)));
    const tokens = await MuxaShiki.tokenize(code, lang, dark);
    return JSON.stringify(tokens);
  }
</script>
</body>
</html>
